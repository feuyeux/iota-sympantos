<svg xmlns="http://www.w3.org/2000/svg" width="2200" height="1500" viewBox="0 0 2200 1500">
  <defs>
    <style>
      text { font-family: Arial, Helvetica, sans-serif; fill: #0f172a; }
      .title { font-size: 28px; font-weight: 700; }
      .subtitle { font-size: 14px; fill: #475569; }
      .laneTitle { font-size: 18px; font-weight: 700; fill: #1e293b; }
      .laneNote { font-size: 12px; fill: #64748b; }
      .entryLane { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 1.2; rx: 18; }
      .presentationLane { fill: #f0f9ff; stroke: #bae6fd; stroke-width: 1.2; rx: 18; }
      .serviceLane { fill: #f7fee7; stroke: #d9f99d; stroke-width: 1.2; rx: 18; }
      .protocolLane { fill: #fff7ed; stroke: #fed7aa; stroke-width: 1.2; rx: 18; }
      .contextLane { fill: #fdf4ff; stroke: #f5d0fe; stroke-width: 1.2; rx: 18; }
      .storeLane { fill: #f1f5f9; stroke: #cbd5e1; stroke-width: 1.2; rx: 18; }
      .externalLane { fill: #fef2f2; stroke: #fecaca; stroke-width: 1.2; rx: 18; }
      .configLane { fill: #ecfdf5; stroke: #bbf7d0; stroke-width: 1.2; rx: 18; }
      .mod { fill: #ffffff; stroke: #475569; stroke-width: 1.35; rx: 10; }
      .ipcMod { fill: #fff1f2; stroke: #dc2626; stroke-width: 1.7; rx: 10; }
      .tcpMod { fill: #fffbeb; stroke: #d97706; stroke-width: 1.7; rx: 10; }
      .netMod { fill: #eff6ff; stroke: #2563eb; stroke-width: 1.7; rx: 10; }
      .name { font-size: 13px; font-weight: 700; }
      .desc { font-size: 11px; fill: #475569; }
      .edge { stroke: #334155; stroke-width: 1.55; fill: none; marker-end: url(#arrow); }
      .thin { stroke: #64748b; stroke-width: 1.15; fill: none; marker-end: url(#arrow-light); }
      .ipc { stroke: #dc2626; stroke-width: 1.8; fill: none; stroke-dasharray: 8 5; marker-end: url(#arrow-red); }
      .tcp { stroke: #d97706; stroke-width: 1.8; fill: none; stroke-dasharray: 8 5; marker-end: url(#arrow-orange); }
      .net { stroke: #2563eb; stroke-width: 1.8; fill: none; stroke-dasharray: 8 5; marker-end: url(#arrow-blue); }
      .label { font-size: 11px; fill: #334155; paint-order: stroke; stroke: white; stroke-width: 4px; stroke-linejoin: round; }
      .ipcLabel { font-size: 11px; fill: #b91c1c; font-weight: 700; paint-order: stroke; stroke: white; stroke-width: 4px; stroke-linejoin: round; }
      .tcpLabel { font-size: 11px; fill: #b45309; font-weight: 700; paint-order: stroke; stroke: white; stroke-width: 4px; stroke-linejoin: round; }
      .legend { font-size: 12px; fill: #334155; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0 L10 5 L0 10z" fill="#334155"/></marker>
    <marker id="arrow-light" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0 0 L10 5 L0 10z" fill="#64748b"/></marker>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0 L10 5 L0 10z" fill="#dc2626"/></marker>
    <marker id="arrow-orange" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0 L10 5 L0 10z" fill="#d97706"/></marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0 L10 5 L0 10z" fill="#2563eb"/></marker>
  </defs>

  <text x="40" y="44" class="title">iota-sympantos layered module relationship map</text>
  <text x="40" y="70" class="subtitle">Clean layered view: primary runtime flow goes downward; local module fan-out stays within the same lane; dashed lines mark process/TCP/stdio/network boundaries.</text>

  <rect x="30" y="100" width="2140" height="90" class="entryLane"/>
  <text x="55" y="130" class="laneTitle">Entry Layer</text>
  <text x="55" y="152" class="laneNote">binary startup</text>

  <rect x="30" y="210" width="2140" height="175" class="presentationLane"/>
  <text x="55" y="240" class="laneTitle">Presentation Layer</text>
  <text x="55" y="262" class="laneNote">commands and terminal UI</text>

  <rect x="30" y="405" width="2140" height="125" class="serviceLane"/>
  <text x="55" y="435" class="laneTitle">Service Orchestration Layer</text>
  <text x="55" y="457" class="laneNote">engine pool and turn lifecycle</text>

  <rect x="30" y="550" width="2140" height="170" class="protocolLane"/>
  <text x="55" y="580" class="laneTitle">Protocol Adapter Layer</text>
  <text x="55" y="602" class="laneNote">ACP/MCP adapters and event mapping</text>

  <rect x="30" y="740" width="2140" height="190" class="contextLane"/>
  <text x="55" y="770" class="laneTitle">Context Fabric Layer</text>
  <text x="55" y="792" class="laneNote">context capsule, skills, MCP sidecars, projections</text>

  <rect x="30" y="950" width="2140" height="140" class="storeLane"/>
  <text x="55" y="980" class="laneTitle">Store Layer</text>
  <text x="55" y="1002" class="laneNote">SQLite stores</text>

  <rect x="30" y="1110" width="2140" height="155" class="externalLane"/>
  <text x="55" y="1140" class="laneTitle">External Process / Network Boundaries</text>
  <text x="55" y="1162" class="laneNote">IPC and subprocesses</text>

  <rect x="30" y="1285" width="2140" height="110" class="configLane"/>
  <text x="55" y="1315" class="laneTitle">Configuration and Shared Utility Layer</text>
  <text x="55" y="1337" class="laneNote">read-only config and low-level helpers</text>

  <!-- Entry -->
  <rect x="1010" y="120" width="180" height="52" class="mod"/>
  <text x="1032" y="143" class="name">main.rs</text><text x="1032" y="161" class="desc">Tokio entrypoint</text>

  <!-- Presentation -->
  <rect x="175" y="260" width="190" height="64" class="mod"/>
  <text x="197" y="286" class="name">cli.rs</text><text x="197" y="304" class="desc">command dispatch</text>
  <rect x="500" y="260" width="190" height="64" class="mod"/>
  <text x="522" y="286" class="name">tui.rs</text><text x="522" y="304" class="desc">ratatui runtime loop</text>
  <rect x="780" y="235" width="150" height="46" class="mod"/><text x="800" y="264" class="name">composer.rs</text>
  <rect x="960" y="235" width="150" height="46" class="mod"/><text x="980" y="264" class="name">markdown.rs</text>
  <rect x="1140" y="235" width="150" height="46" class="mod"/><text x="1160" y="264" class="name">status_bar.rs</text>
  <rect x="1320" y="235" width="150" height="46" class="mod"/><text x="1350" y="264" class="name">theme.rs</text>
  <rect x="1500" y="235" width="150" height="46" class="mod"/><text x="1534" y="264" class="name">state.rs</text>
  <rect x="1680" y="235" width="170" height="46" class="mod"/><text x="1702" y="258" class="name">TUI channels</text><text x="1702" y="276" class="desc">stream / approval</text>

  <!-- Service -->
  <rect x="500" y="435" width="220" height="66" class="mod"/>
  <text x="522" y="462" class="name">agent.rs</text><text x="522" y="480" class="desc">daemon TCP plane</text>
  <rect x="920" y="435" width="240" height="66" class="mod"/>
  <text x="942" y="462" class="name">engine.rs</text><text x="942" y="480" class="desc">IotaEngine orchestration</text>

  <!-- Protocol -->
  <rect x="580" y="590" width="210" height="66" class="mod"/>
  <text x="602" y="617" class="name">acp.rs</text><text x="602" y="635" class="desc">AcpClient JSON-RPC</text>
  <rect x="840" y="580" width="145" height="52" class="mod"/><text x="860" y="612" class="name">acp_wire.rs</text>
  <rect x="1015" y="580" width="155" height="52" class="mod"/><text x="1035" y="612" class="name">acp_session.rs</text>
