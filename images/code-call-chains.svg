  <path class="edge" d="M1495 857 L1495 915 L772 915"/><text x="1295" y="907" class="label">project memory</text>
  <path class="edge" d="M1495 857 L1495 880 L515 880 L515 857"/><text x="1100" y="872" class="label">project skills</text>

