  <path class="thin" d="M772 1068 L772 1280 L1055 1280 L1055 1320"/>
  <path class="thin" d="M1042 1068 L1042 1320"/>
  <path class="thin" d="M1325 1068 L1325 1275 L1055 1275"/>

