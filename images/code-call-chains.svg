  <path class="edge" d="M960 501 L960 540 L685 540 L685 590"/><text x="730" y="532" class="label">ACP prompt</text>
  <path class="edge" d="M1000 501 L1000 735 L275 735 L275 795"/><text x="390" y="726" class="label">compose context</text>
  <path class="edge" d="M1020 501 L1020 750 L515 750 L515 795"/><text x="600" y="742" class="label">load/match skills</text>
  <path class="edge" d="M1040 501 L1040 765 L755 765 L755 795"/><text x="790" y="756" class="label">engine-run skill</text>
  <path class="edge" d="M1060 501 L1060 925 L512 925 L512 1008"/><text x="585" y="917" class="label">events/timing/cache</text>
  <path class="edge" d="M1080 501 L1080 910 L772 910 L772 1008"/><text x="810" y="902" class="label">recall/write memory</text>
  <path class="edge" d="M1100 501 L1100 895 L1325 895 L1325 1008"/><text x="1168" y="886" class="label">session/handoff</text>

  <!-- Protocol local relations -->
  <path class="thin" d="M790 606 L840 606"/>
  <path class="thin" d="M790 612 L1015 606"/>
  <path class="thin" d="M790 618 L1200 606"/>
  <path class="thin" d="M790 624 L1400 606"/>
  <path class="thin" d="M790 630 L1590 606"/>
  <path class="edge" d="M755 857 L755 884 L1857 884 L1857 632"/><text x="1280" y="875" class="label">MCP skill tool calls</text>
  <path class="edge" d="M1285 632 L1285 970 L1042 970 L1042 1008"/><text x="1080" y="960" class="label">permission store</text>
  <path class="edge" d="M1667 632 L1667 940 L772 940 L772 1008"/><text x="1180" y="932" class="label">iota_memory_search</text>
  <path class="edge" d="M1667 632 L1667 755 L515 755 L515 795"/><text x="1220" y="747" class="label">iota_skill_search</text>

  <!-- Context local relations -->
  <path class="edge" d="M360 826 L430 826"/><text x="370" y="815" class="label">skill index</text>
  <path class="edge" d="M275 857 L275 930 L772 930 L772 1008"/><text x="420" y="922" class="label">memory buckets</text>
