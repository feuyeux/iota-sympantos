  <rect x="1780" y="580" width="155" height="52" class="mod"/><text x="1800" y="612" class="name">mcp_client.rs</text>

  <!-- Context -->
  <rect x="190" y="795" width="170" height="62" class="mod"/>
  <text x="212" y="821" class="name">context.rs</text><text x="212" y="839" class="desc">capsule/dialogue</text>
  <rect x="430" y="795" width="170" height="62" class="mod"/>
  <text x="452" y="821" class="name">skills.rs</text><text x="452" y="839" class="desc">registry/triggers</text>
  <rect x="670" y="795" width="170" height="62" class="mod"/>
  <text x="692" y="821" class="name">skill_runner.rs</text><text x="692" y="839" class="desc">engine-run MCP</text>
  <rect x="930" y="795" width="175" height="62" class="mod"/>
  <text x="952" y="821" class="name">context_mcp.rs</text><text x="952" y="839" class="desc">MCP tools/resources</text>
  <rect x="1165" y="795" width="175" height="62" class="mod"/>
  <text x="1187" y="821" class="name">fun_mcp.rs</text><text x="1187" y="839" class="desc">7 language tools</text>
  <rect x="1400" y="795" width="190" height="62" class="mod"/>
  <text x="1422" y="821" class="name">native_materializer.rs</text><text x="1422" y="839" class="desc">native projection</text>
