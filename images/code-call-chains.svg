  <text x="1672" y="821" class="name">skill_registry_cache.rs</text><text x="1672" y="839" class="desc">pull/cache skills</text>

  <!-- Store -->
  <rect x="420" y="1008" width="185" height="60" class="mod"/>
  <text x="442" y="1033" class="name">event_store.rs</text><text x="442" y="1051" class="desc">executions/events</text>
  <rect x="690" y="1008" width="165" height="60" class="mod"/>
  <text x="712" y="1033" class="name">memory.rs</text><text x="712" y="1051" class="desc">memory SQLite/FTS</text>
  <rect x="960" y="1008" width="165" height="60" class="mod"/>
  <text x="982" y="1033" class="name">approval.rs</text><text x="982" y="1051" class="desc">policy/store</text>
  <rect x="1230" y="1008" width="190" height="60" class="mod"/>
  <text x="1252" y="1033" class="name">session_ledger.rs</text><text x="1252" y="1051" class="desc">sessions/handoff</text>

  <!-- External -->
  <rect x="175" y="1180" width="185" height="58" class="tcpMod"/>
  <text x="197" y="1205" class="name">iota __daemon</text><text x="197" y="1223" class="desc">child process</text>
  <rect x="430" y="1180" width="190" height="58" class="tcpMod"/>
  <text x="452" y="1205" class="name">127.0.0.1:47661</text><text x="452" y="1223" class="desc">TCP JSON line</text>
  <rect x="685" y="1180" width="230" height="58" class="ipcMod"/>
  <text x="707" y="1205" class="name">ACP backend process</text><text x="707" y="1223" class="desc">Claude/Codex/Gemini/etc.</text>
  <rect x="1000" y="1180" width="210" height="58" class="ipcMod"/>
  <text x="1022" y="1205" class="name">MCP sidecar process</text><text x="1022" y="1223" class="desc">iota context/fun MCP</text>
  <rect x="1280" y="1180" width="220" height="58" class="ipcMod"/>
  <text x="1302" y="1205" class="name">compiler/interpreter</text><text x="1302" y="1223" class="desc">python/node/rustc/go/etc.</text>
  <rect x="1560" y="1180" width="165" height="58" class="ipcMod"/>
  <text x="1582" y="1205" class="name">git</text><text x="1582" y="1223" class="desc">status --short</text>
  <rect x="1810" y="1180" width="185" height="58" class="netMod"/>
  <text x="1832" y="1205" class="name">HTTP(S) source</text><text x="1832" y="1223" class="desc">skill pull</text>

  <!-- Config -->
  <rect x="620" y="1320" width="210" height="56" class="mod"/>
  <text x="642" y="1344" class="name">config.rs</text><text x="642" y="1362" class="desc">nimia/env/MCP config</text>
  <rect x="960" y="1320" width="190" height="56" class="mod"/>
  <text x="982" y="1344" class="name">utils.rs</text><text x="982" y="1362" class="desc">time/summary/lock</text>

  <!-- Main flow: intentionally orthogonal -->
  <path class="edge" d="M1010 146 L270 146 L270 260"/><text x="545" y="136" class="label">main -> cli::run()</text>
  <path class="edge" d="M365 292 L500 292"/><text x="405" y="282" class="label">tui</text>
  <path class="edge" d="M270 324 L270 392 L610 392 L610 435"/><text x="335" y="384" class="label">daemon route</text>
  <path class="edge" d="M270 324 L270 405 L1040 405 L1040 435"/><text x="575" y="396" class="label">direct run / bench</text>
  <path class="edge" d="M595 324 L595 385 L1040 385 L1040 435"/><text x="720" y="376" class="label">TUI prompt task</text>
  <path class="edge" d="M720 468 L920 468"/><text x="765" y="456" class="label">EnginePool</text>

  <!-- TUI local fan-out; short lines only -->
  <path class="thin" d="M690 266 L780 258"/>
  <path class="thin" d="M690 270 L960 258"/>
  <path class="thin" d="M690 274 L1140 258"/>
  <path class="thin" d="M690 278 L1320 258"/>
  <path class="thin" d="M690 282 L1500 258"/>
  <path class="thin" d="M690 286 L1680 258"/>

